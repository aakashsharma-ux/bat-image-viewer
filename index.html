<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bat-Viewer</title>
<link rel="icon" type="image/png" href="batman-logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- STICKY TOPBAR — always visible, all controls here -->
<div id="topbar">
  <div class="logo">
    <div class="logo-icon"><img src="batman-logo.png" alt="Batman"></div>
    <span class="logo-text">Bat-Viewer</span>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Image Size</span>
    <input type="range" class="ctrl-slider" id="sizer" min="1" max="10" value="3" step="1">
    <span class="ctrl-badge" id="sizeBadge">Medium</span>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Scroll Speed <small>(W/S)</small></span>
    <input type="range" class="ctrl-slider" id="scrollSpeed" min="1" max="5" value="2" step="1">
    <span class="ctrl-badge" id="scrollBadge">Slow</span>
  </div>

  <label class="ctrl-toggle" title="Toggle zoom (Z key)">
    <input type="checkbox" id="zoomEnabled">
    <span class="tog-track"><span class="tog-thumb"></span></span>
    <span class="ctrl-label">Zoom <small>(Z)</small></span>
  </label>

  <!-- Theme toggle: Night (dark) ↔ Moon (light) -->
  <label class="ctrl-toggle theme-toggle" id="themeToggleLabel" title="Toggle theme">
    <input type="checkbox" id="themeToggle">
    <span class="tog-track tog-theme"><span class="tog-thumb"></span></span>
    <span class="ctrl-label" id="themeLabel">🌙 Night</span>
  </label>
</div>

<!-- SCROLLABLE PAGE BODY -->
<div id="pageBody">

  <div id="inputbar">
    <textarea id="bulkArea" placeholder="Paste image URLs — one per line or comma-separated (up to 1,000). New load replaces previous set."></textarea>
    <div id="inputControls">
      <span class="bulk-tally" id="bulkTally"><b>0</b> URLs</span>
      <label class="append-toggle">
        <input type="checkbox" id="appendMode"><span>Append</span>
      </label>
      <button class="btn btn-ghost" id="bulkClearBtn">Clear</button>
      <button class="btn btn-gold" id="bulkLoadBtn">Load Images</button>
    </div>
    <div class="status hide" id="statusMsg"></div>
    <div class="prog-wrap hide" id="progWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel"></div>
    </div>
  </div>

  <div id="gtoolbar">
    <span class="gstats"><b id="gCount">0</b> images loaded</span>
    <button class="btn btn-ghost" id="clearAllBtn">Clear All</button>
  </div>

  <div class="gallery-wrap">
    <div id="gallery"></div>
  </div>

</div>

<button id="btt" aria-label="Back to top">&#8593;</button>

<script src="app.js"></script>
</body>
</html>
